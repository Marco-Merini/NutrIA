name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nutri-app

jobs:
  # ─────────────────────────────────────────────
  # 1. Testes (.NET 8.0)
  # ─────────────────────────────────────────────
  test:
    name: Testes (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Compilar Solução
        run: dotnet build --no-restore -c Release

      - name: Rodar testes com cobertura
        run: |
          dotnet test --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Publicar resumo de cobertura
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: '**/coverage.cobertura.xml'
          badge: true
          fail_below_min: false
          format: markdown
          output: both

      - name: Upload cobertura xml
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-coverage
          path: '**/coverage.cobertura.xml'
          retention-days: 1
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # 2. Análise SonarCloud
  # ─────────────────────────────────────────────
  sonar:
    name: Análise SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Cobertura report
        uses: actions/download-artifact@v4
        with:
          name: cobertura-coverage
          path: TestResults

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin /k:"Marco-Merini_NutrIA" /o:"marco-merini" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.cobertura.reportsPaths="TestResults/**/coverage.cobertura.xml"
          dotnet build --no-incremental
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ─────────────────────────────────────────────
  # 3. Build e push da imagem Docker
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar QEMU (multi-plataforma)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados (tag = SHA curto)
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build e push — App
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.APP_IMAGE }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────
  # 4. Deploy no EC2 via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Vai para o diretório da aplicação
            cd /opt/nutria
            # Atualiza o repositório (descarta alterações locais em arquivos rastreados)
            git reset --hard HEAD
            git pull origin main
            # Atualiza variável da tag da imagem
            export TAG=${{ needs.build-and-push.outputs.image-tag }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            # Faz login no Docker Hub (necessário para pull de imagens privadas)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            # Puxa a nova imagem
            docker pull ${DOCKERHUB_USERNAME}/nutri-app:${TAG}
            # Reinicia os serviços com o docker-compose
            TAG=${TAG} docker compose up -d --no-build
            # Remove imagens antigas para liberar espaço
            docker image prune -f
            echo "Deploy concluido. Tag: ${TAG}"
