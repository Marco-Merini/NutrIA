name: NutrIA CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código-Fonte
      uses: actions/checkout@v4

    - name: Configurar ambiente .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar Dependências NuGet
      run: dotnet restore

    - name: Compilar Solução (Release)
      run: dotnet build --no-restore -c Release

    - name: Executar Testes Unitários com Cobertura
      run: |
        dotnet test --no-build -c Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

    - name: Validar Docker Build (Continuous Delivery)
      run: |
        docker build -t nutri-app:latest .
