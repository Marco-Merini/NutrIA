services:
  nutri-app:
    image: nutri-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutri-app
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAG__ChatModel=gpt-4o-mini
      - RAG__EmbeddingModel=text-embedding-3-small
      - RAG__TopK=8
      - RAG__ScoreThreshold=0.25
      - RAG__MaxTokensResposta=2000
      - RAG__ChunkBatchSize=50
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_RUNNING_IN_CONTAINER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
